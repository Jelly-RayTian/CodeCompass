name: Release

on:
  push:
    tags: ['v*']

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows Installers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node deps
        run: npm ci

      - name: Frontend lint
        run: npm run lint

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend test
        run: npm run test

      - name: Frontend build
        run: npm run build

      - name: Rust fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust test
        working-directory: src-tauri
        run: cargo test

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Build installers
        run: npm run tauri:build

      - name: Prepare artifacts
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe release-artifacts/ -ErrorAction SilentlyContinue
          Copy-Item src-tauri/target/release/bundle/msi/*.msi release-artifacts/ -ErrorAction SilentlyContinue
          Get-ChildItem release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          name: '${{ github.ref_name }} — CodeCompass'
          body: |
            ## CodeCompass ${{ github.ref_name }}

            A local-first desktop application for understanding unfamiliar code repositories.

            ### Install

            Download and run the `.exe` (NSIS) or `.msi` (MSI) installer below.

            ### Notes

            - This is a **prerelease** — may contain rough edges.
            - Installers are **unsigned**. Windows may show a SmartScreen warning.
            - Requires Windows 10 or later.
          files: release-artifacts/*
