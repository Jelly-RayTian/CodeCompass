name: Release

on:
  push:
    tags: ['v*']

# Release needs to create a GitHub Release and upload artifacts.
# `contents: write` is the minimal scope required for that.
permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build Windows Installers
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install Node deps (npm ci)
        run: npm ci

      - name: Validate version alignment with tag
        run: node scripts/check-versions.mjs --tag=${{ github.ref_name }}

      - name: Frontend lint
        run: npm run lint

      - name: Frontend typecheck
        run: npm run typecheck

      - name: Frontend test
        run: npm run test

      - name: Frontend build
        run: npm run build

      - name: Rust fmt
        working-directory: src-tauri
        run: cargo fmt --check

      - name: Rust clippy
        working-directory: src-tauri
        run: cargo clippy --all-targets -- -D warnings

      - name: Rust test
        working-directory: src-tauri
        run: cargo test

      - name: Rust check
        working-directory: src-tauri
        run: cargo check

      - name: Build installers
        run: npm run tauri:build

      - name: Validate NSIS installer (required)
        run: |
          $nsis = Get-ChildItem src-tauri/target/release/bundle/nsis/*.exe -ErrorAction SilentlyContinue
          if (-not $nsis) {
            Write-Error "NSIS installer is missing — build may have failed"
            exit 1
          }
          Write-Host "NSIS: $($nsis.FullName)"

      - name: Validate MSI installer (optional)
        run: |
          $msi = Get-ChildItem src-tauri/target/release/bundle/msi/*.msi -ErrorAction SilentlyContinue
          if ($msi) {
            Write-Host "MSI: $($msi.FullName)"
          } else {
            Write-Warning "MSI installer not produced — continuing without it"
          }

      - name: Prepare release artifacts
        run: |
          New-Item -ItemType Directory -Force -Path release-artifacts | Out-Null
          Copy-Item src-tauri/target/release/bundle/nsis/*.exe release-artifacts/ -ErrorAction Stop
          Copy-Item src-tauri/target/release/bundle/msi/*.msi release-artifacts/ -ErrorAction SilentlyContinue
          Write-Host "Artifacts:"
          Get-ChildItem release-artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          prerelease: true
          name: '${{ github.ref_name }} — CodeCompass'
          body: |
            ## CodeCompass ${{ github.ref_name }}

            A local-first desktop application for understanding unfamiliar code repositories.

            ### Install

            Download and run the `.exe` (NSIS, **required**) or `.msi` (MSI, optional) installer below.

            > **Unsigned installers.** These builds are not code-signed, so
            > Windows SmartScreen may show a warning. Click **More info →
            > Run anyway** to proceed. Your source files are never modified
            > by CodeCompass.

            ### Requirements

            - Windows 10 or later
            - Git (optional, only for the Git panel)

            ### Verify

            After installing, the Start Menu entry, window icon, and
            installer icon should all show the CodeCompass compass badge.
          files: release-artifacts/*
